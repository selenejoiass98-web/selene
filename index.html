<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Sélene Jóias</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold: #7C5C35; --gold-light: #C4A47A; --gold-pale: #E0CEBB;
  --cream: #F5F0EA; --brown: #3D2B1A; --text: #2A1F14;
  --text-soft: #9C8070; --white: #FEFCF9; --red: #E53E3E;
}
body {
  font-family: 'Jost', sans-serif;
  background: var(--brown);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: absolute;
  top: -30%; left: -20%;
  width: 600px; height: 600px;
  border-radius: 50%;
  border: 1px solid rgba(196,164,122,0.08);
}
body::after {
  content: '';
  position: absolute;
  bottom: -20%; right: -10%;
  width: 400px; height: 400px;
  border-radius: 50%;
  border: 1px solid rgba(196,164,122,0.06);
}

.login-box {
  background: var(--white);
  width: 100%;
  max-width: 420px;
  padding: 3rem 2.5rem;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.6s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

.login-logo {
  text-align: center;
  margin-bottom: 2rem;
}
.login-logo .brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 300;
  letter-spacing: 0.3em;
  color: var(--gold);
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.2rem;
}
.login-logo .tag {
  font-size: 0.55rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--text-soft);
}
.login-divider {
  width: 40px; height: 1px;
  background: var(--gold-light);
  margin: 1.2rem auto;
}

.login-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 300;
  color: var(--brown);
  text-align: center;
  margin-bottom: 0.3rem;
}
.login-sub {
  font-size: 0.72rem;
  color: var(--text-soft);
  text-align: center;
  margin-bottom: 2rem;
  letter-spacing: 0.05em;
}

.form-group { margin-bottom: 1.2rem; }
.form-label {
  display: block;
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-soft);
  margin-bottom: 0.5rem;
}
.form-input {
  width: 100%;
  padding: 0.85rem 1rem;
  border: 1px solid var(--gold-pale);
  background: var(--white);
  font-family: 'Jost', sans-serif;
  font-size: 0.88rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--gold-light); }
.form-input.error { border-color: var(--red); }

.password-wrap { position: relative; }
.toggle-pwd {
  position: absolute;
  right: 1rem; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer;
  font-size: 1rem;
  color: var(--text-soft);
  padding: 0;
  line-height: 1;
}

.btn-login {
  width: 100%;
  padding: 1rem;
  background: var(--gold);
  color: var(--white);
  border: none;
  font-family: 'Jost', sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 0.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}
.btn-login:hover { background: #5C3D28; }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

.error-msg {
  background: #FFF5F5;
  border: 1px solid #FED7D7;
  color: var(--red);
  padding: 0.8rem 1rem;
  font-size: 0.72rem;
  margin-bottom: 1rem;
  display: none;
  letter-spacing: 0.02em;
}
.error-msg.show { display: block; }

.login-footer {
  text-align: center;
  margin-top: 1.5rem;
  font-size: 0.6rem;
  color: var(--text-soft);
  letter-spacing: 0.1em;
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">
    <span class="brand">Sélene Jóias</span>
    <div class="login-divider"></div>
    <span class="tag">Painel Administrativo</span>
  </div>

  <h2 class="login-title">Bem-vinda de volta</h2>
  <p class="login-sub">Entre com suas credenciais para acessar o painel</p>

  <div class="error-msg" id="error-msg">E-mail ou senha incorretos. Tente novamente.</div>

  <div class="form-group">
    <label class="form-label">E-mail</label>
    <input type="email" class="form-input" id="email"
      placeholder="seu@email.com"
      onkeydown="if(event.key==='Enter') login()">
  </div>

  <div class="form-group">
    <label class="form-label">Senha</label>
    <div class="password-wrap">
      <input type="password" class="form-input" id="senha"
        placeholder="••••••••"
        onkeydown="if(event.key==='Enter') login()">
      <button class="toggle-pwd" onclick="togglePwd()" type="button" id="toggle-pwd">👁</button>
    </div>
  </div>

  <button class="btn-login" onclick="login()" id="btn-login">
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">Entrar no Painel</span>
  </button>

  <div class="login-footer">
    🔒 Acesso restrito · Sélene Jóias © 2025
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAsGGXCg0GfbJKsGuGDWDHfVpdeBna-aYI",
  authDomain: "selene-joias.firebaseapp.com",
  projectId: "selene-joias",
  storageBucket: "selene-joias.firebasestorage.app",
  messagingSenderId: "395713731584",
  appId: "1:395713731584:web:c29c4d3f53254e0ed10ce5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Se já logado, vai direto pro dashboard
onAuthStateChanged(auth, user => {
  if (user) window.location.href = 'dashboard.html';
});

window.login = async function() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const btn = document.getElementById('btn-login');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btn-text');
  const errorMsg = document.getElementById('error-msg');

  if (!email || !senha) {
    errorMsg.textContent = 'Preencha e-mail e senha.';
    errorMsg.classList.add('show');
    return;
  }

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Entrando...';
  errorMsg.classList.remove('show');

  try {
    await signInWithEmailAndPassword(auth, email, senha);
    window.location.href = 'dashboard.html';
  } catch(e) {
    errorMsg.textContent = 'E-mail ou senha incorretos. Tente novamente.';
    errorMsg.classList.add('show');
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Entrar no Painel';
  }
};

window.togglePwd = function() {
  const input = document.getElementById('senha');
  const btn = document.getElementById('toggle-pwd');
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁'; }
};
</script>
</body>
</html>
